name: Metrics

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Generate GitHub Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          user: jcfinoquio-itera

          template: classic

          base: header, activity, community, repositories, metadata

          config_timezone: Europe/Madrid

          repositories_forks: yes
          commits_authoring: all

          #########################
          # 📊 ACTIVITY
          #########################
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14

          #########################
          # 📈 LINES (INSERTS/DELETES)
          #########################
          plugin_lines: yes
          plugin_lines_sections: base, repositories, history
          plugin_lines_repositories_limit: 10
          plugin_lines_history_limit: 3
          plugin_lines_delay: 0
          plugin_lines_indepth: yes

          #########################
          # 🧠 LANGUAGES
          #########################
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_limit: 8
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: programming

          #########################
          # 📅 CALENDAR
          #########################
          plugin_isocalendar: yes

          #########################
          # 🔁 HABITS (muy útil)
          #########################
          plugin_habits: yes
          plugin_habits_days: 30

          #########################
          # ⭐ STARS
          #########################
          plugin_stars: yes

          #########################
          # 🌐 TRAFFIC
          #########################
          plugin_traffic: yes

          #########################
          # 🔎 FOLLOWUP INSIGHTS
          #########################
          plugin_followup: yes
